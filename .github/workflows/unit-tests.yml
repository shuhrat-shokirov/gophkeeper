name: Units Tests & Coverage

on:
  push:
    branches:
      - develop
  pull_request:

permissions:
  pull-requests: write
  contents: write
  pages: write

concurrency:
  group: ${{ github.actor }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run services
        uses: ./.github/services

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          check-latest: true
          cache-dependency-path: |
            ./go.sum

      - name: Install dependencies
        run: |
          go mod tidy
          go install github.com/t-yuki/gocover-cobertura@latest

      - name: Run tests with coverage
        run: |
          go test $(go list ./... | grep -v '/cmd/' | grep -v '/proto/') -coverprofile=coverage.out.mocks -covermode=atomic
          grep -v -e 'mock' -e 'proto' coverage.out.mocks > coverage.out # убрать mock и proto из отчёта покрытия

      - name: Convert coverage to Cobertura format
        run: $(which gocover-cobertura) < coverage.out > coverage.xml

      - name: Coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          fail_below_min: false
          format: markdown
          indicators: true
          output: both
          thresholds: '50 60'

      - name: Add coverage report to pull request
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md

      - name: Checkout to gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Update coverage badge
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          npm i -g badgen-cli
          export COV=${{ steps.coverage-values.outputs.total}}
          COLOR=$(node -p '+process.env.COV >= 70 ? `green` : `orange`')
          mkdir -p badges
          badgen -j coverage -s $COV% -c $COLOR > badges/coverage.svg
      - name: Deploy badges
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Update coverage badge"
          branch: gh-pages
          skip_fetch: true
          skip_checkout: true