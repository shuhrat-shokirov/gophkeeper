services:
  postgres-db:
    image: postgres:16
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=goph_keeper_db
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U user -d testdb'"]
      interval: 3s
      timeout: 5s
      retries: 5